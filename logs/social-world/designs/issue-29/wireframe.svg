<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Dev Tools Drawer 线框图 · Issue #29</text>
  
  <!-- === Screen A: Normal State === -->
  <g transform="translate(60, 80)">
    <text x="180" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">A. 常态页面（Debug Mode）</text>
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="720" rx="24" ry="24" fill="#fff" stroke="#999" stroke-width="2"/>
    <!-- Status bar -->
    <rect x="0" y="0" width="360" height="40" rx="24" ry="24" fill="#e0e0e0"/>
    <rect x="0" y="20" width="360" height="20" fill="#e0e0e0"/>
    <!-- Page content (login page placeholder) -->
    <rect x="20" y="60" width="320" height="40" rx="4" fill="#d0d0d0"/>
    <rect x="20" y="120" width="320" height="56" rx="8" fill="#e8e8e8"/>
    <rect x="20" y="190" width="200" height="56" rx="8" fill="#e8e8e8"/>
    <rect x="230" y="190" width="110" height="56" rx="8" fill="#d8d8d8"/>
    <rect x="20" y="270" width="320" height="48" rx="8" fill="#b0b0b0"/>
    
    <!-- Floating Toggle Button -->
    <circle cx="336" cy="360" r="28" fill="#999" opacity="0.6"/>
    <text x="336" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">⚙</text>
    
    <!-- Annotation -->
    <line x1="380" y1="360" x2="440" y2="360" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="450" y="340" font-family="Arial, sans-serif" font-size="12" fill="#666">DevToolsToggleButton</text>
    <text x="450" y="358" font-family="Arial, sans-serif" font-size="11" fill="#888">直径 56dp · 右侧距边 8dp</text>
    <text x="450" y="374" font-family="Arial, sans-serif" font-size="11" fill="#888">半透明 · 不拦截手势</text>
    <text x="450" y="390" font-family="Arial, sans-serif" font-size="11" fill="#888">仅 kDebugMode 渲染</text>
  </g>
  
  <!-- === Screen B: Drawer Open === -->
  <g transform="translate(560, 80)">
    <text x="180" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">B. 抽屉展开态</text>
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="720" rx="24" ry="24" fill="#fff" stroke="#999" stroke-width="2"/>
    <!-- Status bar -->
    <rect x="0" y="0" width="360" height="40" rx="24" ry="24" fill="#e0e0e0"/>
    <rect x="0" y="20" width="360" height="20" fill="#e0e0e0"/>
    <!-- Page content (dimmed) -->
    <rect x="20" y="60" width="320" height="40" rx="4" fill="#d0d0d0"/>
    <rect x="20" y="120" width="320" height="56" rx="8" fill="#e8e8e8"/>
    <rect x="20" y="190" width="200" height="56" rx="8" fill="#e8e8e8"/>
    <rect x="230" y="190" width="110" height="56" rx="8" fill="#d8d8d8"/>
    <rect x="20" y="270" width="320" height="48" rx="8" fill="#b0b0b0"/>
    
    <!-- Overlay scrim -->
    <rect x="0" y="40" width="360" height="680" rx="0" fill="#000" opacity="0.15"/>
    
    <!-- Drawer -->
    <rect x="72" y="40" width="288" height="680" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <!-- Drawer header -->
    <rect x="72" y="40" width="288" height="56" fill="#f0f0f0"/>
    <text x="96" y="74" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">开发工具</text>
    <text x="330" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#777">✕</text>
    
    <!-- Drawer content: Server URL card -->
    <rect x="88" y="112" width="256" height="160" rx="12" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="104" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#666">Server Base URL</text>
    <rect x="104" y="156" width="224" height="48" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
    <text x="116" y="184" font-family="Arial, sans-serif" font-size="12" fill="#777">http://192.168.1.100:3000/api/v1</text>
    <rect x="104" y="216" width="224" height="40" rx="8" fill="#888"/>
    <text x="216" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">保存配置</text>
    
    <!-- Future tools placeholder -->
    <rect x="88" y="288" width="256" height="80" rx="12" fill="#fff" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="216" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#aaa">更多工具占位区</text>
    
    <!-- Annotations -->
    <line x1="60" y1="200" x2="20" y2="200" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="10" y="180" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">点击遮罩/滑动关闭</text>
    <text x="10" y="196" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">动画 250ms</text>
    
    <line x1="380" y1="150" x2="420" y2="150" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="430" y="140" font-family="Arial, sans-serif" font-size="12" fill="#666">DevToolsDrawer</text>
    <text x="430" y="156" font-family="Arial, sans-serif" font-size="11" fill="#888">宽度 70%~80%</text>
    <text x="430" y="172" font-family="Arial, sans-serif" font-size="11" fill="#888">最大 360dp</text>
  </g>
  
  <!-- === Screen C: Error State === -->
  <g transform="translate(60, 520)">
    <text x="180" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">C. 校验错误态</text>
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="360" rx="24" ry="24" fill="#fff" stroke="#999" stroke-width="2"/>
    <!-- Status bar -->
    <rect x="0" y="0" width="360" height="40" rx="24" ry="24" fill="#e0e0e0"/>
    <rect x="0" y="20" width="360" height="20" fill="#e0e0e0"/>
    <!-- Overlay scrim -->
    <rect x="0" y="40" width="360" height="320" rx="0" fill="#000" opacity="0.15"/>
    <!-- Drawer -->
    <rect x="72" y="40" width="288" height="320" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <rect x="72" y="40" width="288" height="56" fill="#f0f0f0"/>
    <text x="96" y="74" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">开发工具</text>
    <!-- Error card -->
    <rect x="88" y="112" width="256" height="180" rx="12" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="104" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#666">Server Base URL</text>
    <rect x="104" y="156" width="224" height="48" rx="8" fill="#fff5f5" stroke="#c44" stroke-width="2"/>
    <text x="116" y="184" font-family="Arial, sans-serif" font-size="12" fill="#555">invalid-url</text>
    <text x="104" y="216" font-family="Arial, sans-serif" font-size="11" fill="#c44">请输入有效的 HTTP/HTTPS URL</text>
    <rect x="104" y="232" width="224" height="40" rx="8" fill="#ccc"/>
    <text x="216" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">保存配置</text>
    
    <!-- Annotation -->
    <line x1="380" y1="180" x2="420" y2="180" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="430" y="170" font-family="Arial, sans-serif" font-size="11" fill="#666">URL 格式校验失败</text>
    <text x="430" y="186" font-family="Arial, sans-serif" font-size="11" fill="#666">保存按钮置灰</text>
    <text x="430" y="202" font-family="Arial, sans-serif" font-size="11" fill="#666">输入框边框变红</text>
  </g>
  
  <!-- === User Flow Diagram === -->
  <g transform="translate(560, 520)">
    <text x="200" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#555">D. 用户交互流程</text>
    
    <!-- Flow nodes -->
    <rect x="20" y="20" width="120" height="40" rx="20" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
    <text x="80" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">启动 App</text>
    
    <polygon points="80,80 60,110 100,110" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
    <text x="80" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Debug?</text>
    
    <rect x="140" y="80" width="120" height="40" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="200" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Release: 无入口</text>
    
    <rect x="20" y="140" width="120" height="40" rx="4" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="80" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">显示悬浮按钮</text>
    
    <rect x="20" y="210" width="120" height="40" rx="4" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="80" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">点击展开抽屉</text>
    
    <rect x="170" y="210" width="120" height="40" rx="4" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="230" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">修改 URL</text>
    
    <rect x="170" y="280" width="120" height="40" rx="4" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="230" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">校验通过?</text>
    
    <rect x="20" y="280" width="120" height="40" rx="4" fill="#ffcccc" stroke="#c44" stroke-width="1"/>
    <text x="80" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c44">显示错误提示</text>
    
    <rect x="170" y="350" width="120" height="40" rx="4" fill="#d4edda" stroke="#5a5" stroke-width="1"/>
    <text x="230" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#363">持久化 &amp; 生效</text>
    
    <!-- Flow arrows -->
    <line x1="80" y1="60" x2="80" y2="78" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="100" y1="100" x2="138" y2="100" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="125" y="92" font-family="Arial, sans-serif" font-size="10" fill="#666">否</text>
    <line x1="80" y1="110" x2="80" y2="138" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="88" y="128" font-family="Arial, sans-serif" font-size="10" fill="#666">是</text>
    <line x1="80" y1="180" x2="80" y2="208" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="140" y1="230" x2="168" y2="230" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="250" x2="230" y2="278" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="170" y1="300" x2="142" y2="300" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="155" y="292" font-family="Arial, sans-serif" font-size="10" fill="#c44">否</text>
    <line x1="230" y1="320" x2="230" y2="348" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="238" y="338" font-family="Arial, sans-serif" font-size="10" fill="#363">是</text>
    <line x1="80" y1="320" x2="80" y2="350" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
    <line x1="80" y1="370" x2="80" y2="390" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="80" y1="390" x2="168" y2="390" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="168" y1="390" x2="168" y2="368" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="125" y="384" font-family="Arial, sans-serif" font-size="10" fill="#666">重新输入</text>
  </g>
  
  <!-- Dimensions legend -->
  <g transform="translate(60, 840)">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#555">尺寸标注：</text>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" fill="#666">悬浮按钮 56×56dp · 抽屉最大 360dp · 输入框高度 56dp · 按钮高度 48dp · 页面边距 16dp</text>
  </g>
</svg>
