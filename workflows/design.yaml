name: design-task
steps:
  - id: fetchOrigin
    label: 同步远程分支
    type: shell
    command: git fetch origin
    ignoreError: true

  - id: makeDesignsDir
    label: 创建 designs 目录
    type: shell
    command: |
      mkdir -p {{ .Vars.tmpDir }}/designs/issue-{{ .Vars.issueNumber }}
      # 清理之前任务可能残留的预览目录，防止旧资产被复制到日志
      rm -rf {{ .Vars.tmpDir }}/designs/issue-{{ .Vars.issueNumber }}/web
      rm -rf {{ .Vars.tmpDir }}/designs/issue-{{ .Vars.issueNumber }}/preview

  - id: validateAgentInputs
    label: 校验 agent 启动参数
    type: shell
    command: |
      AGENT_FILE={{ .Vars.agentFile | shellquote }}
      PROMPT={{ .Vars.prompt | shellquote }}
      if [ -z "$AGENT_FILE" ] || [ ! -f "$AGENT_FILE" ]; then
        echo "❌ agentFile 未设置或不存在: $AGENT_FILE"
        exit 1
      fi
      if [ -z "$PROMPT" ]; then
        echo "❌ prompt 未设置"
        exit 1
      fi
      echo "✅ agent 启动参数校验通过"
    ignoreError: false

  - id: checkProjectMap
    label: 检查项目地图存在性
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      mkdir -p logs
      if [ -f "AGENTS.md" ] || [ -f "README.md" ]; then
        echo "✅ 项目地图存在"
      else
        echo "⚠️ project_map_missing: true（AGENTS.md 和 README.md 均不存在）" >> "logs/design-diagnose-{{ .Vars.issueNumber }}.md"
        echo "⚠️ 未找到项目地图，agent 可能无法定位设计规范"
      fi
    ignoreError: true

  - id: runAgent
    label: 运行 ui-designer agent
    type: shell
    tmux: true
    dir: '{{ .Vars.tmpDir }}'
    command: |
      kimi --agent-file {{ .Vars.agentFile | shellquote }} \
           --max-steps-per-turn 45 \
           --print \
           -p {{ .Vars.prompt | shellquote }}
    env:
      AGENT_ISSUE_NUMBER: '{{ .Vars.issueNumber }}'
      AGENT_ISSUE_TITLE: '{{ .Vars.issueTitle }}'
      AGENT_LOG_FILE: '{{ .Vars.logFileName }}'
    outputKey: agentOutput
    logFile: '{{ .Vars.logFileName }}'

  - id: diagnoseAgentRun
    label: 诊断 design agent 执行状态
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      LOG_FILE="{{ .Vars.logFileName }}"
      DESIGN_DIR="designs/issue-{{ .Vars.issueNumber }}"
      mkdir -p logs

      if [ -f "$LOG_FILE" ] && [ -s "$LOG_FILE" ]; then
        STEP_COUNT=$(grep -cE 'tool_call|ToolCall|tool_use|Using tool' "$LOG_FILE" 2>/dev/null || echo "0")
        WRITE_COUNT=$(grep -cE 'WriteFile|StrReplaceFile' "$LOG_FILE" 2>/dev/null || echo "0")
        echo "design agent 工具调用: $STEP_COUNT, 写操作: $WRITE_COUNT" > "logs/design-diagnose-{{ .Vars.issueNumber }}.md"
        if [ "$WRITE_COUNT" -eq 0 ]; then
          echo "⚠️ agent 未执行任何 WriteFile/StrReplaceFile，可能因 prompt 约束提前终止且未执行强制写入" >> "logs/design-diagnose-{{ .Vars.issueNumber }}.md"
        fi
      else
        echo "❌ design agent 日志为空或不存在" > "logs/design-diagnose-{{ .Vars.issueNumber }}.md"
      fi

      if [ ! -d "$DESIGN_DIR" ] || [ -z "$(ls -A "$DESIGN_DIR" 2>/dev/null)" ]; then
        echo "❌ designs 目录无产出: $DESIGN_DIR" >> "logs/design-diagnose-{{ .Vars.issueNumber }}.md"
      fi
    ignoreError: true

  - id: buildFlutterPreview
    label: 编译设计预览
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      export PATH="/opt/flutter/bin:$PATH"
      BASE_TEMPLATE="{{ .Vars.projectRoot }}/.tools/flutter_preview_generic"
      DESIGNS_DIR="designs/issue-{{ .Vars.issueNumber }}"
      # 创建临时预览编译目录（避免多任务同时修改共享模板）
      PREVIEW_BUILD_DIR=$(mktemp -d -t "flutter-preview-{{ .Vars.issueNumber }}-XXXXXX")

      # 复制模板到临时目录
      cp -R "$BASE_TEMPLATE/." "$PREVIEW_BUILD_DIR/"

      # 动态生成 pubspec.yaml：读取当前项目的 Dart 包名并注入为本地依赖
      PROJECT_PATH="{{ .Vars.projectPath }}"
      if [ -f "$PROJECT_PATH/pubspec.yaml" ]; then
        DART_PKG=$(grep -m1 '^name:' "$PROJECT_PATH/pubspec.yaml" | sed 's/name:\s*//')
        printf '%s\n' \
          'name: flutter_preview_generic' \
          'description: "Flutter preview"' \
          "publish_to: 'none'" \
          'version: 1.0.0+1' \
          '' \
          'environment:' \
          "  sdk: '>=3.4.0 <4.0.0'" \
          '' \
          'dependencies:' \
          '  flutter:' \
          '    sdk: flutter' \
          '  cupertino_icons: ^1.0.8' \
          "  $DART_PKG:" \
          "    path: $PROJECT_PATH" \
          '' \
          'dev_dependencies:' \
          '  flutter_test:' \
          '    sdk: flutter' \
          '  flutter_lints: ^5.0.0' \
          '' \
          'flutter:' \
          '  uses-material-design: true' \
          > "$PREVIEW_BUILD_DIR/pubspec.yaml"
      fi

      # ========== Flutter 项目预览 ==========
      HAS_FLUTTER_ASSETS=false
      if [ -f "$DESIGNS_DIR/preview.dart" ] || [ -d "$DESIGNS_DIR/flutter-widgets" ]; then
        HAS_FLUTTER_ASSETS=true
      fi

      if [ "$HAS_FLUTTER_ASSETS" = false ]; then
        rm -f "$PREVIEW_BUILD_DIR/lib/main.dart"
        rm -rf "$PREVIEW_BUILD_DIR/lib/preview"
      fi

      # 情况1：有自包含的 preview.dart，直接使用
      PREVIEW_FILE="$DESIGNS_DIR/preview.dart"
      if [ -f "$PREVIEW_FILE" ]; then
        cp "$PREVIEW_FILE" "$PREVIEW_BUILD_DIR/lib/main.dart"
        echo "📄 使用 preview.dart 作为入口"
      else
        # 情况2：有 flutter-widgets/ 目录，自动提取 Widget 生成入口
        WIDGETS_DIR="$DESIGNS_DIR/flutter-widgets"
        if [ -d "$WIDGETS_DIR" ]; then
          rm -rf "$PREVIEW_BUILD_DIR/lib/"*
          mkdir -p "$PREVIEW_BUILD_DIR/lib/preview"
          cp -R "$WIDGETS_DIR/"* "$PREVIEW_BUILD_DIR/lib/preview/"
          python3 "/root/squirrel-house/.tools/generate_preview_main.py" "$WIDGETS_DIR" "$PREVIEW_BUILD_DIR/lib/main.dart"
          echo "🔧 已从 flutter-widgets/ 生成预览入口"
        fi
      fi

      # 如果前面触发了 Flutter 编译
      if [ -f "$PREVIEW_BUILD_DIR/lib/main.dart" ]; then
        cd "$PREVIEW_BUILD_DIR"
        rm -rf "$PREVIEW_BUILD_DIR/build/web"
        flutter build web --release --base-href "/logs/{{ .Vars.projectName }}/designs/issue-{{ .Vars.issueNumber }}/web/" 2>&1
        if [ -d "$PREVIEW_BUILD_DIR/build/web" ]; then
          mkdir -p "{{ .Vars.tmpDir }}/$DESIGNS_DIR/web"
          cp -R "$PREVIEW_BUILD_DIR/build/web/"* "{{ .Vars.tmpDir }}/$DESIGNS_DIR/web/"
          echo "✅ Flutter Web 预览编译完成"
        else
          echo "❌ Flutter Web 编译失败"
        fi
      fi

      # 清理临时目录
      rm -rf "$PREVIEW_BUILD_DIR"

      # 如果没有生成任何预览，记录日志
      if [ ! -d "{{ .Vars.tmpDir }}/$DESIGNS_DIR/web" ]; then
        echo "⚠️ 未找到 preview.dart / flutter-widgets，跳过 Flutter 预览编译"
      fi
    ignoreError: true
    logFile: '{{ .Vars.logFileName }}.preview-build'

  - id: createDocPlaceholders
    label: 创建文档占位文件
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      DOC_FILE="designs/issue-{{ .Vars.issueNumber }}/docs-to-update.txt"
      if [ -f "$DOC_FILE" ]; then
        while IFS='|' read -r path desc; do
          [ -z "$path" ] && continue
          dir=$(dirname "$path")
          mkdir -p "$dir"
          if [ ! -f "$path" ]; then
            {
              echo "# $desc"
              echo ""
              echo "> TODO: 由设计任务自动生成，待开发阶段补充。"
              echo ""
              echo "## 相关设计"
              echo "- 设计规范: [design-spec.md](../designs/issue-{{ .Vars.issueNumber }}/design-spec.md)"
            } > "$path"
          fi
        done < "$DOC_FILE"
      fi
    ignoreError: true

  - id: ensureCommitAndPush
    label: 提交并推送设计资产
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      git add -A && \
      (git diff --cached --quiet || git commit -m "design: add assets for issue #{{ .Vars.issueNumber }}") && \
      git push origin {{ .Vars.branch }} || true

  - id: copyDesignAssets
    label: 复制设计资产到日志目录
    type: shell
    isCleanup: true
    command: |
      mkdir -p {{ .Vars.logsDir }}/designs && \
      rm -rf {{ .Vars.logsDir }}/designs/issue-{{ .Vars.issueNumber }} && \
      cp -R {{ .Vars.tmpDir }}/designs/issue-{{ .Vars.issueNumber }} {{ .Vars.logsDir }}/designs/issue-{{ .Vars.issueNumber }}
    ignoreError: true

  - id: cleanupWorktree
    label: 清理 worktree
    type: shell
    isCleanup: true
    command: |
      git worktree remove --force {{ .Vars.tmpDir }} || true
      rm -rf {{ .Vars.tmpDir }}
    ignoreError: true
