name: pr-rework
steps:
  - id: fetchOrigin
    label: 同步远程分支
    type: shell
    command: git fetch origin
    ignoreError: true

  - id: installDeps
    label: 安装项目依赖
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      if [ -f "pnpm-lock.yaml" ] && [ ! -d "node_modules" ]; then
        pnpm install || npm install
      elif [ -f "package-lock.json" ] && [ ! -d "node_modules" ]; then
        npm install
      fi
      if [ -f "apps/mobile/pubspec.yaml" ]; then
        cd apps/mobile && flutter pub get
      fi
      if [ -f "packages/design-system/pubspec.yaml" ]; then
        cd packages/design-system && flutter pub get
      fi
      if [ -f "apps/phaser3/package.json" ] && [ ! -d "apps/phaser3/node_modules" ]; then
        cd apps/phaser3 && (pnpm install || npm install)
      fi
    ignoreError: true

  - id: validateAgentInputs
    label: 校验 agent 启动参数
    type: shell
    command: |
      AGENT_FILE={{ .Vars.agentFile | shellquote }}
      PROMPT={{ .Vars.prompt | shellquote }}
      if [ -z "$AGENT_FILE" ] || [ ! -f "$AGENT_FILE" ]; then
        echo "❌ agentFile 未设置或不存在: $AGENT_FILE"
        exit 1
      fi
      if [ -z "$PROMPT" ]; then
        echo "❌ prompt 未设置"
        exit 1
      fi
      echo "✅ agent 启动参数校验通过"
    ignoreError: false

  - id: envReadinessCheck
    label: 环境就绪检查
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    outputKey: envCheckStatus
    command: |
      echo "=== 环境就绪检查 ==="
      MISSING=0

      if [ -f "AGENTS.md" ]; then
        echo "✅ AGENTS.md"
      else
        echo "⚠️ AGENTS.md 缺失"
        MISSING=1
      fi

      if [ -f "Makefile" ]; then
        echo "✅ Makefile"
      else
        echo "ℹ️ Makefile 缺失（非必须）"
      fi

      if [ -f "{{ .Vars.reviewReportPath }}" ]; then
        echo "✅ review report: {{ .Vars.reviewReportPath }}"
        REPORT_SIZE=$(wc -c < "{{ .Vars.reviewReportPath }}")
        if [ "$REPORT_SIZE" -lt 50 ]; then
          echo "⚠️ review report 内容过短（${REPORT_SIZE} 字节），可能为空报告"
          echo "review_report_empty: true" >> logs/rework-env-check.txt
        fi
      else
        echo "⚠️ review report 不存在: {{ .Vars.reviewReportPath }}"
        MISSING=1
      fi

      # 将检查结果写入文件供 agent 读取
      mkdir -p logs
      echo "env_check_time: $(date -Iseconds)" > logs/rework-env-check.txt
      echo "review_report_exists: $([ -f '{{ .Vars.reviewReportPath }}' ] && echo 'true' || echo 'false')" >> logs/rework-env-check.txt
      echo "agents_md_exists: $([ -f 'AGENTS.md' ] && echo 'true' || echo 'false')" >> logs/rework-env-check.txt

      # 同时写入结构化 JSON 文件，减少 agent 自行探测的次数
      REVIEW_EXISTS=$([ -f '{{ .Vars.reviewReportPath }}' ] && echo 'true' || echo 'false')
      AGENTS_EXISTS=$([ -f 'AGENTS.md' ] && echo 'true' || echo 'false')
      MAKEFILE_EXISTS=$([ -f 'Makefile' ] && echo 'true' || echo 'false')
      MISSING_VAL=$([ "$MISSING" -eq 1 ] && echo 'true' || echo 'false')
      echo '{
        "env_check_time": "'$(date -Iseconds)'",
        "review_report_exists": '$REVIEW_EXISTS',
        "review_report_path": "{{ .Vars.reviewReportPath }}",
        "agents_md_exists": '$AGENTS_EXISTS',
        "makefile_exists": '$MAKEFILE_EXISTS',
        "missing_critical": '$MISSING_VAL'
      }' > logs/rework-env-check.json

      if [ "$MISSING" -eq 1 ]; then
        echo "⚠️ 部分关键文件缺失，agent 可能需要额外处理"
      fi

      # 如果 review report 不存在，直接生成默认报告并标记跳过 agent
      if [ ! -f "{{ .Vars.reviewReportPath }}" ]; then
        echo "review_report_missing: generating default noop report"
        echo "## Rework 结论" > logs/rework-noop.md
        echo "" >> logs/rework-noop.md
        echo "结论: NO_REVIEW_REPORT" >> logs/rework-noop.md
        echo "" >> logs/rework-noop.md
        echo "review report 不存在，无需执行修复。时间: $(date -Iseconds)" >> logs/rework-noop.md
        echo "SKIP_AGENT"
      else
        echo "READY"
      fi
    ignoreError: true

  - id: runAgent
    label: 运行 rework agent
    type: shell
    tmux: true
    condition: '{{ contains (.State.envCheckStatus | trim) "READY" }}'
    dir: '{{ .Vars.tmpDir }}'
    command: |
      kimi --agent-file {{ .Vars.agentFile | shellquote }} \
           --max-steps-per-turn 40 \
           --print \
           -p {{ .Vars.prompt | shellquote }}
    env:
      AGENT_ISSUE_NUMBER: '{{ .Vars.issueNumber }}'
      AGENT_ISSUE_TITLE: '{{ .Vars.issueTitle }}'
      AGENT_LOG_FILE: '{{ .Vars.logFileName }}'
      AGENT_MODE: 'rework'
      AGENT_REVIEW_REPORT: '{{ .Vars.reviewReportPath }}'
      AGENT_ENV_CHECK_FILE: '{{ .Vars.tmpDir }}/logs/rework-env-check.json'
      # AGENT_AGENTS_MD 由 dashboard 在 buildAgentContext 中自动设置，无需在此覆盖
    outputKey: agentOutput
    logFile: '{{ .Vars.logFileName }}'

  - id: diagnoseAgentRun
    label: 诊断 rework agent 执行状态
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      LOG_FILE="{{ .Vars.logFileName }}"
      DIAGNOSE_FILE="logs/rework-diagnose.md"
      mkdir -p logs

      if [ -f "$LOG_FILE" ] && [ -s "$LOG_FILE" ]; then
        STEP_COUNT=$(grep -cE 'tool_call|ToolCall|tool_use|Using tool' "$LOG_FILE" 2>/dev/null || echo "0")
        WRITE_COUNT=$(grep -cE 'WriteFile|StrReplaceFile' "$LOG_FILE" 2>/dev/null || echo "0")
        ERROR_COUNT=$(grep -cE '"is_error":\s*true' "$LOG_FILE" 2>/dev/null || echo "0")
        STR_FAIL_COUNT=$(grep -cE 'old string not found' "$LOG_FILE" 2>/dev/null || echo "0")
        FILE_MISSING_COUNT=$(grep -cE 'file_not_found|outside the workspace|does not exist' "$LOG_FILE" 2>/dev/null || echo "0")
        SHELL_FAIL_COUNT=$(grep -cE 'command not found|exit code|timed out' "$LOG_FILE" 2>/dev/null || echo "0")
        echo "rework agent 工具调用: $STEP_COUNT, 写操作: $WRITE_COUNT, 错误: $ERROR_COUNT" > "$DIAGNOSE_FILE"
        echo "错误分类 — StrReplaceFile 失败: $STR_FAIL_COUNT, 文件缺失: $FILE_MISSING_COUNT, Shell 失败: $SHELL_FAIL_COUNT" >> "$DIAGNOSE_FILE"

        # Git 禁令自动化检测（精确匹配 Shell 工具调用，避免误报 reasoning/prompt 中的声明文本）
        GIT_USAGE=$(python3 /root/squirrel-house/scripts/detect-git-usage.py "$LOG_FILE" "checkout|log|blame|show|reset|revert|merge|rebase" 2>/dev/null || echo "0")
        if [ "$GIT_USAGE" -gt 0 ]; then
          echo "⚠️ 检测到 agent 使用了禁用 git 命令（${GIT_USAGE} 次），违反 developer.md Git 禁令" >> "$DIAGNOSE_FILE"
          # 创建违规标记文件，阻止后续提交
          touch logs/rework-git-violation.flag
          # 如果存在 rework 报告，追加违规声明
          for f in logs/rework-*.md; do
            if [ -f "$f" ]; then
              echo "" >> "$f"
              echo "## Workflow 违规检测" >> "$f"
              echo "⚠️ workflow 检测到 agent 在本任务中使用了禁用的本地 git 命令 ${GIT_USAGE} 次（如 git checkout）。developer.md 明确禁止此类操作。" >> "$f"
            fi
          done
        fi
        if [ "$WRITE_COUNT" -eq 0 ]; then
          echo "⚠️ agent 未执行任何 WriteFile/StrReplaceFile，可能因 prompt 约束提前终止且未执行强制写入" >> "$DIAGNOSE_FILE"
          # 生成默认 noop 报告，避免零产出任务被统计为失败
          echo "## Rework 结论" > logs/rework-noop.md
          echo "" >> logs/rework-noop.md
          echo "结论: NO_CODE_CHANGES" >> logs/rework-noop.md
          echo "" >> logs/rework-noop.md
          echo "agent 已运行但未产生任何代码修改。可能原因：review report 中的问题已无法复现、目标文件已不存在、或 agent 未执行强制写入。时间: $(date -Iseconds)" >> logs/rework-noop.md
          echo "已生成默认 noop 报告: logs/rework-noop.md" >> "$DIAGNOSE_FILE"
        fi
      else
        echo "❌ rework agent 日志为空或不存在" > "$DIAGNOSE_FILE"
      fi
    ignoreError: true

  - id: checkAgentOutput
    label: 检查 agent 是否有文件修改产出
    type: shell
    condition: '{{ contains (.State.envCheckStatus | trim) "READY" }}'
    dir: '{{ .Vars.tmpDir }}'
    command: |
      LOG_FILE="{{ .Vars.logFileName }}"
      WRITE_COUNT=0
      if [ -f "$LOG_FILE" ]; then
        # 匹配 WriteFile、StrReplaceFile 以及 kimi 的 edit 格式
        WRITE_COUNT=$(grep -cE 'WriteFile|StrReplaceFile|"edit":' "$LOG_FILE" 2>/dev/null || echo "0")
      fi

      if [ "$WRITE_COUNT" -gt 0 ]; then
        echo "✅ agent 执行了 $WRITE_COUNT 次写入操作"
        exit 0
      fi

      if ! git diff --quiet HEAD 2>/dev/null || ! git diff --cached --quiet 2>/dev/null; then
        echo "✅ 检测到 git 未提交修改"
        exit 0
      fi

      # agent 可能已自行 commit，检查是否有新提交
      NEW_COMMITS=$(git log --oneline origin/{{ .Vars.branch }}..HEAD 2>/dev/null | wc -l)
      if [ "$NEW_COMMITS" -gt 0 ]; then
        echo "✅ 检测到 $NEW_COMMITS 个新提交"
        exit 0
      fi

      echo "❌ rework agent 未产生任何文件修改、写入操作或新提交"
      echo "rework_output_check_failed: true" >> logs/rework-diagnose.md
      exit 1
    ignoreError: true

  - id: checkGitViolation
    label: 检查 Git 禁令违规
    type: shell
    condition: '{{ contains (.State.envCheckStatus | trim) "READY" }}'
    dir: '{{ .Vars.tmpDir }}'
    command: |
      if [ -f "logs/rework-git-violation.flag" ]; then
        echo "❌ Git 禁令违规：agent 在本任务中使用了禁用的本地 git 命令（如 git checkout）。终止 workflow，禁止提交。"
        exit 1
      fi
      echo "✅ 未检测到 Git 禁令违规"
    ignoreError: false

  - id: preCommitChecks
    label: 提交前强制检查
    type: shell
    condition: '{{ contains (.State.envCheckStatus | trim) "READY" }}'
    dir: '{{ .Vars.tmpDir }}'
    command: |
      echo "=== Pre-Commit Checks ==="
      FAILED=0

      # 1. 检查 Flutter 硬编码颜色
      if [ -d "packages/design-system" ]; then
        HARDCODED=$(grep -rn "Color(0xFF" packages/design-system/lib/src/ 2>/dev/null | grep -v "tokens.dart" | head -20)
        if [ -n "$HARDCODED" ]; then
          echo "❌ 发现 Design-System 硬编码颜色："
          echo "$HARDCODED"
          FAILED=1
        fi
      fi

      # 2. 检查 Maestro 不兼容写法
      if [ -d "packages/design-system" ]; then
        INKWELL=$(grep -rn "InkWell.*onTap:" packages/design-system/lib/src/ 2>/dev/null | head -10)
        if [ -n "$INKWELL" ]; then
          echo "❌ 发现 Maestro 不兼容的 InkWell.onTap："
          echo "$INKWELL"
          FAILED=1
        fi
      fi

      # 3. 检查 BDD steps 是否为空实现
      for f in tests/bdd/step-definitions/*.steps.js; do
        if [ -f "$f" ]; then
          EMPTY=$(grep -c "() => {}" "$f" 2>/dev/null) || EMPTY=0
          if [ "$EMPTY" -gt 0 ]; then
            echo "❌ $f 存在 $EMPTY 个空实现步骤"
            FAILED=1
          fi
        fi
      done

      # 4. 检查 Maestro E2E flow（如果涉及新页面/交互）
      NEW_PAGES=$(git diff --name-only --cached 2>/dev/null | grep "apps/mobile/lib/presentation/pages/" | wc -l || echo 0)
      NEW_MAESTRO=$(git diff --name-only --cached 2>/dev/null | grep ".maestro/flows/" | wc -l || echo 0)
      if [ "$NEW_PAGES" -gt 0 ] && [ "$NEW_MAESTRO" -eq 0 ]; then
        echo "⚠️ 新增页面但未新增 Maestro E2E flow（如果页面不在核心流程中可忽略）"
      fi

      # 5. 运行 lint（如果 Makefile 存在）
      if [ -f "Makefile" ]; then
        make lint 2>&1 | tail -20 || true
      fi

      if [ "$FAILED" -eq 1 ]; then
        echo "❌ Pre-Commit Checks 失败，终止提交"
        exit 1
      fi
      echo "✅ Pre-Commit Checks 通过"
    ignoreError: false

  - id: ensureCommitAndPush
    label: 强制提交并推送
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    isCleanup: true
    command: |
      git add -A && \
      (git diff --cached --quiet || git commit -m "fix: auto-commit by agent") && \
      git push origin {{ .Vars.branch }} || true
    ignoreError: true

  - id: cleanupWorktree
    label: 清理 worktree
    type: shell
    isCleanup: true
    command: |
      git worktree remove --force {{ .Vars.tmpDir }} || true
      rm -rf {{ .Vars.tmpDir }}
    ignoreError: true
