name: pr-review
steps:
  - id: checkCurrentBranch
    label: 检测当前分支
    type: shell
    command: git branch --show-current
    outputKey: currentBranch
    ignoreError: true

  - id: stashAndCheckout
    label: 释放目标分支占用
    type: shell
    condition: '{{ eq (.State.currentBranch | trim) .Vars.branch }}'
    command: |
      git stash push -m "dashboard-review-auto-stash" && \
      git checkout origin/{{ .Vars.branch }} || git checkout {{ .Vars.branch }}
    ignoreError: true

  - id: makeLogsDir
    label: 创建 logs 目录
    type: shell
    command: mkdir -p {{ .Vars.tmpDir }}/logs

  - id: extractDesignAssets
    label: 提取设计图资源
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      # 设计资产和 Figma 链接已由 Dashboard 预生成
      touch .design-assets.txt .figma-links.txt .doc-coverage.txt
    ignoreError: true

  - id: extractDocCoverage
    label: 提取文档覆盖信息
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      # 文档覆盖信息已由 Dashboard 预生成
      touch .doc-coverage.txt
      echo "" >> .doc-coverage.txt
      echo "=== 现有 docs 目录结构（顶层） ===" >> .doc-coverage.txt
      ls -R docs/ 2>/dev/null | head -n 50 >> .doc-coverage.txt || true
    ignoreError: true

  - id: validateAgentInputs
    label: 校验 agent 启动参数
    type: shell
    command: |
      if [ -z "{{ .Vars.agentFile }}" ] || [ ! -f "{{ .Vars.agentFile }}" ]; then
        echo "❌ agentFile 未设置或不存在: {{ .Vars.agentFile }}"
        exit 1
      fi
      if [ -z "{{ .Vars.prompt }}" ]; then
        echo "❌ prompt 未设置"
        exit 1
      fi
      echo "✅ agent 启动参数校验通过"
    ignoreError: false

  - id: envReadinessCheck
    label: 平台环境就绪检查
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    outputKey: envCheckStatus
    command: |
      echo "=== 平台环境就绪检查 ==="
      PR_NUMBER="{{ .Vars.prNumber }}"
      PLATFORM="{{ .Vars.platformType }}"
      CLI="{{ .Vars.platformCLI }}"
      mkdir -p logs

      if ! $CLI auth status >/dev/null 2>&1; then
        echo "auth_failed: $CLI CLI 未认证"
        exit 0
      fi

      if [ "$PLATFORM" = "gitlab" ]; then
        if ! glab mr view "$PR_NUMBER" >/dev/null 2>&1; then
          echo "mr_not_found: MR #${PR_NUMBER} 不存在或无法访问"
          exit 0
        fi
      else
        if ! gh pr view "$PR_NUMBER" --json number >/dev/null 2>&1; then
          echo "pr_not_found: PR #${PR_NUMBER} 不存在或无法访问"
          exit 0
        fi
      fi

      echo "READY"
    ignoreError: true

  - id: runAgent
    label: 运行 reviewer agent
    type: shell
    tmux: true
    # 移除 condition：让 reviewer agent 始终运行，由 agent prompt 内部处理环境异常并快速 WriteFile 失败报告。
    # 历史数据显示 review 任务 successRate=0、avgSteps=0，核心原因是 envCheckStatus 非 READY 导致 agent 被静默跳过。
    dir: '{{ .Vars.tmpDir }}'
    command: |
      kimi --agent-file {{ .Vars.agentFile | shellquote }} \
           --max-steps-per-turn 40 \
           --print \
           -p {{ .Vars.prompt | shellquote }}
    env:
      AGENT_PR_NUMBER: '{{ .Vars.prNumber }}'
      AGENT_PR_BRANCH: '{{ .Vars.branch }}'
      AGENT_LOG_FILE: '{{ .Vars.logFileName }}'
      AGENT_REVIEW_REPORT: '{{ .Vars.tmpDir }}/logs/review-report-{{ .Vars.prNumber }}.md'
      AGENT_ENV_STATUS: '{{ .State.envCheckStatus | trim }}'
      AGENT_MANDATORY_WRITE_STEP: '6'
      # AGENT_AGENTS_MD 由 dashboard 在 buildAgentContext 中自动设置，无需在此覆盖
    outputKey: agentOutput
    logFile: '{{ .Vars.logFileName }}'
    ignoreError: true

  - id: diagnoseAgentRun
    label: 诊断 agent 是否真实执行
    type: shell
    dir: '{{ .Vars.tmpDir }}'
    command: |
      LOG_FILE="{{ .Vars.logFileName }}"
      REPORT_FILE="{{ .Vars.tmpDir }}/logs/review-report-{{ .Vars.prNumber }}.md"

      # 确保报告目录存在
      mkdir -p "{{ .Vars.tmpDir }}/logs"

      # 检查日志文件是否存在且有内容
      if [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
        echo "❌ review agent 日志为空或不存在，agent 可能未成功启动"
        # 生成默认失败报告，避免零产出
        echo "## 审查结论" > "$REPORT_FILE"
        echo "" >> "$REPORT_FILE"
        echo "审查结论: FAIL" >> "$REPORT_FILE"
        echo "" >> "$REPORT_FILE"
        echo "## 失败原因" >> "$REPORT_FILE"
        echo "agent 未产生任何工具调用，可能因启动失败或配置错误导致。时间: $(date -Iseconds)" >> "$REPORT_FILE"
      else
        # 粗略统计工具调用次数（根据 kimi 日志特征）
        STEP_COUNT=$(grep -cE 'tool_call|ToolCall|tool_use|Using tool' "$LOG_FILE" 2>/dev/null || echo "0")
        WRITE_COUNT=$(grep -cE 'WriteFile|StrReplaceFile' "$LOG_FILE" 2>/dev/null || echo "0")
        echo "✅ review agent 日志已生成，估计工具调用次数: $STEP_COUNT, 写操作次数: $WRITE_COUNT"
        if [ "$STEP_COUNT" -eq 0 ] || [ "$WRITE_COUNT" -eq 0 ]; then
          echo "⚠️ 未检测到有效审查产出，生成默认失败报告"
          echo "## 审查结论" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "审查结论: FAIL" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "## 失败原因" >> "$REPORT_FILE"
          if [ "$STEP_COUNT" -eq 0 ]; then
            echo "agent 日志存在但未检测到工具调用，可能启动后未执行或执行异常。时间: $(date -Iseconds)" >> "$REPORT_FILE"
          else
            echo "agent 执行了工具调用但未产生 WriteFile/StrReplaceFile 输出。可能因 prompt 约束提前终止且未执行强制写入。时间: $(date -Iseconds)" >> "$REPORT_FILE"
          fi
          # 零产出视为 workflow 失败，避免任务被错误标记为 success
          exit 1
        fi

        # Git 禁令自动化检测
        GIT_USAGE=$(grep -cE '\bgit\s+(status|diff|log|show|blame|checkout|add|commit|push)\b' "$LOG_FILE" 2>/dev/null || echo "0")
        if [ "$GIT_USAGE" -gt 0 ]; then
          echo "⚠️ 检测到 agent 使用了本地 git 命令（${GIT_USAGE} 次），违反 Git 禁令"
          if [ -f "$REPORT_FILE" ]; then
            # 强制降级审查结论
            sed -i 's/审查结论: PASS/审查结论: NEEDS_MAJOR_FIX（违规：使用了本地 git 命令）/g' "$REPORT_FILE"
            sed -i 's/审查结论: NEEDS_FIX/审查结论: NEEDS_MAJOR_FIX（违规：使用了本地 git 命令）/g' "$REPORT_FILE"
            # 追加违规声明到报告末尾
            echo "" >> "$REPORT_FILE"
            echo "## Workflow 违规检测" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo "⚠️ 审查违规：workflow 检测到 agent 在本任务中使用了本地 git 命令 ${GIT_USAGE} 次。审查结论已强制降级为 NEEDS_MAJOR_FIX。" >> "$REPORT_FILE"
          fi
        fi
      fi
    ignoreError: false

  - id: readReport
    label: 读取审查报告到内存
    type: readFile
    path: '{{ .Vars.tmpDir }}/logs/review-report-{{ .Vars.prNumber }}.md'
    outputKey: reviewReportContent
    ignoreError: true

  - id: copyReport
    label: 复制审查报告到日志目录
    type: shell
    command: cp {{ .Vars.tmpDir }}/logs/review-report-{{ .Vars.prNumber }}.md {{ .Vars.logsDir }}/review-report-{{ .Vars.prNumber }}.md 2>/dev/null || true
    ignoreError: true

  - id: cleanupWorktree
    label: 清理 worktree
    type: shell
    isCleanup: true
    command: |
      git worktree remove --force {{ .Vars.tmpDir }} || true
      rm -rf {{ .Vars.tmpDir }}
    ignoreError: true

  - id: restoreBranch
    label: 恢复本地分支
    type: shell
    condition: '{{ eq (.State.currentBranch | trim) .Vars.branch }}'
    isCleanup: true
    command: |
      git checkout {{ .Vars.branch }} || true
      git stash pop || true
    ignoreError: true
